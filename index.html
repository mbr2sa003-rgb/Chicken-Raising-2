<style>
:root{
  --bg: #FAF6ED;
  --bg-warm: #F3ECDB;
  --surface: #FFFFFF;
  --ink: #2B2420;
  --ink-soft: #6B5F52;
  --green: #2F5233;
  --green-soft: #6B8E4E;
  --gold: #E8A33D;
  --gold-deep: #C87F1A;
  --rust: #8B4226;
  --danger: #C4453D;
  --border: #E6DCC6;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 10px rgba(43,36,32,0.07);
  --shadow-lift: 0 8px 24px rgba(43,36,32,0.14);
  font-size: 16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:'Noto Sans Khmer','Khmer OS',sans-serif;
  overflow-x:hidden;
}
h1,h2,h3,.display{font-family:'Battambang','Khmer OS Battambang',sans-serif; font-weight:700; margin:0;}
button, input, select, textarea{font-family:inherit; font-size:1rem;}
button{cursor:pointer;}
::-webkit-scrollbar{width:6px; height:6px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px;}

#app{max-width:520px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; display:flex; flex-direction:column;}
.screen{display:none; flex:1; padding-bottom:88px;}
.screen.active{display:block; animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Login ---------- */
#loginScreen.screen{padding-bottom:0;}
.login-wrap{min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:32px 24px; background:
  radial-gradient(circle at 20% 10%, #3d6b41 0%, transparent 45%),
  radial-gradient(circle at 90% 90%, #E8A33D 0%, transparent 40%),
  var(--green);
  color:#fff; text-align:center;}
.hen-hero{width:150px; height:150px; margin-bottom:8px;}
.login-wrap h1{font-size:1.9rem; color:#fff; margin-bottom:4px; line-height:1.35;}
.login-wrap p{color:#E8DFC4; font-size:.95rem; margin:6px 0 28px; line-height:1.6;}
.login-card{background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.18); backdrop-filter:blur(6px); border-radius:var(--radius); padding:22px; width:100%; max-width:360px;}
.role-btn{width:100%; padding:16px; border-radius:var(--radius-sm); border:none; margin-bottom:12px; font-size:1.05rem; font-weight:700; font-family:'Battambang',sans-serif; display:flex; align-items:center; gap:12px; justify-content:center; transition:transform .15s;}
.role-btn:active{transform:scale(0.97);}
.role-btn.primary{background:var(--gold); color:#2B2000;}
.role-btn.secondary{background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,0.5);}
.cvc-input{width:100%; padding:14px; border-radius:var(--radius-sm); border:none; margin-bottom:10px; display:none; font-size:1rem;}
.pin-dots{display:flex; gap:14px; justify-content:center; margin:18px 0;}
.pin-dot{width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.6);}
.pin-dot.filled{background:var(--gold); border-color:var(--gold);}
.pin-pad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; max-width:280px; margin:0 auto;}
.pin-pad button{padding:16px; border-radius:12px; border:none; background:rgba(255,255,255,0.12); color:#fff; font-size:1.3rem; font-weight:600;}
.pin-pad button:active{background:rgba(255,255,255,0.28);}
.login-error{color:#FFD3CE; font-size:.85rem; min-height:20px; margin-top:6px;}

/* ---------- Header ---------- */
.topbar{position:sticky; top:0; z-index:20; background:var(--green); color:#fff; padding:16px 18px 18px; border-radius:0 0 20px 20px; box-shadow:var(--shadow-lift);}
.topbar-row{display:flex; justify-content:space-between; align-items:center;}
.topbar .greet{font-size:.8rem; color:#CFE3C9; margin-bottom:2px;}
.topbar h1{font-size:1.3rem; color:#fff;}
.icon-btn{width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.15); border:none; color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.1rem;}
.search-bar{margin-top:14px; background:#fff; border-radius:12px; display:flex; align-items:center; padding:10px 14px; gap:8px;}
.search-bar input{border:none; outline:none; flex:1; font-size:.95rem; color:var(--ink); background:transparent;}
.search-bar svg{flex-shrink:0;}

.page-header{padding:18px 18px 4px;}
.page-header h1{font-size:1.35rem;}
.page-header p{color:var(--ink-soft); font-size:.85rem; margin-top:4px;}

/* ---------- Content ---------- */
.content{padding:16px 18px;}
.section-title{font-size:.78rem; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); margin:22px 0 10px; font-weight:600; display:flex; align-items:center; gap:8px;}
.section-title::after{content:''; flex:1; height:1px; background:var(--border);}

/* KPI cards */
.kpi-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.kpi-card{background:var(--surface); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); border:1px solid var(--border);}
.kpi-card .num{font-family:'Battambang',sans-serif; font-size:1.7rem; font-weight:700; color:var(--green);}
.kpi-card .lbl{font-size:.78rem; color:var(--ink-soft); margin-top:2px; line-height:1.4;}
.kpi-card.gold .num{color:var(--gold-deep);}
.kpi-card.danger .num{color:var(--danger);}
.kpi-card.full{grid-column:1/-1; display:flex; justify-content:space-between; align-items:center;}

/* survival ring */
.survival-wrap{display:flex; align-items:center; gap:16px; background:var(--surface); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); border:1px solid var(--border);}
.survival-wrap svg{flex-shrink:0;}
.survival-text .num{font-family:'Battambang',sans-serif; font-size:1.6rem; font-weight:700; color:var(--green);}
.survival-text .lbl{font-size:.8rem; color:var(--ink-soft);}

/* bars */
.bar-row{margin-bottom:12px;}
.bar-row .bar-top{display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:5px;}
.bar-track{height:9px; background:var(--bg-warm); border-radius:6px; overflow:hidden;}
.bar-fill{height:100%; background:linear-gradient(90deg,var(--green),var(--green-soft)); border-radius:6px;}

/* alerts list */
.alert-item{display:flex; gap:12px; align-items:center; background:#FFF6EC; border:1px solid #F1D9AE; border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:8px;}
.alert-item .dot{width:9px; height:9px; border-radius:50%; background:var(--danger); flex-shrink:0;}
.alert-item .txt{flex:1; font-size:.88rem;}
.alert-item .txt b{display:block; font-size:.92rem;}
.alert-item .txt span{color:var(--ink-soft); font-size:.78rem;}

/* Family list */
.filter-chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:4px;}
.chip{flex-shrink:0; padding:8px 14px; border-radius:20px; background:var(--surface); border:1px solid var(--border); font-size:.82rem; color:var(--ink-soft); white-space:nowrap;}
.chip.active{background:var(--green); color:#fff; border-color:var(--green);}

.fam-card{background:var(--surface); border-radius:var(--radius); padding:14px; margin-bottom:12px; box-shadow:var(--shadow); border:1px solid var(--border); display:flex; gap:12px; align-items:center;}
.fam-avatar{width:50px; height:50px; border-radius:14px; background:var(--bg-warm); display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0;}
.fam-info{flex:1; min-width:0;}
.fam-info h3{font-size:1.02rem; margin-bottom:2px;}
.fam-info .meta{font-size:.78rem; color:var(--ink-soft); display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
.tag{display:inline-block; padding:2px 8px; border-radius:8px; font-size:.68rem; font-weight:600; background:var(--bg-warm); color:var(--rust);}
.tag.warn{background:#FDEAEA; color:var(--danger);}
.tag.ok{background:#E9F2E4; color:var(--green);}
.fam-arrow{color:var(--ink-soft); flex-shrink:0;}

.empty-state{text-align:center; padding:50px 20px; color:var(--ink-soft);}
.empty-state .emoji{font-size:2.6rem; margin-bottom:10px;}
.empty-state h3{color:var(--ink); margin-bottom:6px;}
.empty-state p{font-size:.85rem; line-height:1.6;}

/* Detail screen */

const Auth = {
  role:null, userName:'',
  showCvcInput(){
    document.getElementById('cvcNameInput').style.display='block';
    document.getElementById('cvcSubmitBtn').style.display='block';
    document.getElementById('pinPadWrap').style.display='none';
    document.getElementById('cvcNameInput').focus();
  },
  loginCvc(){
    const name = document.getElementById('cvcNameInput').value.trim();
    if(!name){ Toast.show('សូមវាយបញ្ចូលឈ្មោះរបស់អ្នក'); return; }
    this.role='cvc'; this.userName=name;
    this.enterApp();
  },
  showPinPad(){
    document.getElementById('pinPadWrap').style.display='block';
    document.getElementById('cvcNameInput').style.display='none';
    document.getElementById('cvcSubmitBtn').style.display='none';
    this.pin='';
    this.renderPinDots();
    const pad=document.getElementById('pinPad'); pad.innerHTML='';
    ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
      const b=document.createElement('button');
      b.textContent=k;
      if(k==='') b.style.visibility='hidden';
      b.onclick=()=>this.pinPress(k);
      pad.appendChild(b);
    });
  },
  pin:'',
  pinPress(k){
    if(k==='⌫'){ this.pin=this.pin.slice(0,-1); this.renderPinDots(); return; }
    if(k==='') return;
    if(this.pin.length>=4) return;
    this.pin+=k;
    this.renderPinDots();
    if(this.pin.length===4){
      if(this.pin===DB.settings.pin){ this.role='admin'; this.userName='អ្នកគ្រប់គ្រង'; this.enterApp(); }
      else{ document.getElementById('pinError').textContent='កូដ PIN មិនត្រឹមត្រូវ សូមព្យាយាមម្តងទៀត'; this.pin=''; this.renderPinDots(); }
    }
  },
  renderPinDots(){
    const wrap=document.getElementById('pinDots'); wrap.innerHTML='';
    for(let i=0;i<4;i++){ const d=document.createElement('div'); d.className='pin-dot'+(i<this.pin.length?' filled':''); wrap.appendChild(d); }
  },
  enterApp(){
    document.getElementById('loginScreen').classList.remove('active');
    Nav.go('dashboard');
  },
  logout(){
    this.role=null; this.userName='';
    document.getElementById('cvcNameInput').value='';
    document.getElementById('pinPadWrap').style.display='none';
    document.getElementById('cvcNameInput').style.display='none';
    document.getElementById('cvcSubmitBtn').style.display='none';
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('loginScreen').classList.add('active');
  }
};

/* =========================================================
   HELPERS - aggregate stats
========================================================= */
function batchDeaths(b){ return (b.mortalityLog||[]).reduce((s,m)=>s+Number(m.count||0),0); }
function batchSold(b){ return (b.salesLog||[]).reduce((s,m)=>s+Number(m.count||0),0); }
function batchIncome(b){ return (b.salesLog||[]).reduce((s,m)=>s+Number(m.amount||0),0); }
function batchCurrent(b){ return Math.max(0, Number(b.initialCount||0) - batchDeaths(b) - batchSold(b)); }
function batchStage(b){
  const d = daysBetween(b.receivedDate, todayStr());
  if(d<30) return {label:'កូនមាន់', pct:1};
  if(d<90) return {label:'មាន់ជំទង់', pct:2};
  return {label:'មាន់ពេញវ័យ', pct:3};
}
function famAllBatches(f){ return f.batches||[]; }
function famTotalCurrent(f){ return famAllBatches(f).reduce((s,b)=>s+batchCurrent(b),0); }
function famTotalInitial(f){ return famAllBatches(f).reduce((s,b)=>s+Number(b.initialCount||0),0); }
function famTotalIncome(f){ return famAllBatches(f).reduce((s,b)=>s+batchIncome(b),0); }
function famLastVisit(f){
  let last=null;
  famAllBatches(f).forEach(b=>(b.visitLog||[]).forEach(v=>{ if(!last||v.date>last.date) last=v; }));
  return last;
}
function famNextVisitOverdue(f){
  const lv = famLastVisit(f);
  if(!lv || !lv.nextVisit) return false;
  return lv.nextVisit < todayStr();
}
function allFamilies(){ return DB.families; }

    document.getElementById('userNameTxt').textContent = 'ផ្ទាំងគ្រប់គ្រង';

    const fams = allFamilies();
    const totalFam = fams.length;
    const totalInitial = fams.reduce((s,f)=>s+famTotalInitial(f),0);
    const totalCurrent = fams.reduce((s,f)=>s+famTotalCurrent(f),0);
    const totalDeaths = fams.reduce((s,f)=>s+famAllBatches(f).reduce((s2,b)=>s2+batchDeaths(b),0),0);
    const totalIncome = fams.reduce((s,f)=>s+famTotalIncome(f),0);
    const survivalRate = totalInitial>0 ? Math.round((totalCurrent/totalInitial)*100) : 0;
    const overdue = fams.filter(famNextVisitOverdue);

    const communeCounts = {};
    COMMUNES.forEach(c=>communeCounts[c]=0);
    fams.forEach(f=>{ communeCounts[f.commune]=(communeCounts[f.commune]||0)+1; });
    const maxCommune = Math.max(1,...Object.values(communeCounts));

    const r = document.getElementById('dashContent');
    r.innerHTML = `
      <div class="survival-wrap">
        ${ringSvg(survivalRate)}
        <div class="survival-text">
          <div class="num">${survivalRate}%</div>
          <div class="lbl">អត្រារស់រានរបស់មាន់ទាំងអស់<br>(${totalCurrent} / ${totalInitial} កូនមាន់)</div>
        </div>
      </div>

      <div class="section-title">ស្ថិតិទូទៅ</div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="num">${totalFam}</div><div class="lbl">គ្រួសារកំពុងគាំទ្រ</div></div>
        <div class="kpi-card gold"><div class="num">${totalCurrent}</div><div class="lbl">ចំនួនមាន់បច្ចុប្បន្ន</div></div>
        <div class="kpi-card danger"><div class="num">${totalDeaths}</div><div class="lbl">មាន់ស្លាប់សរុប</div></div>
        <div class="kpi-card"><div class="num">${totalIncome.toLocaleString()}៛</div><div class="lbl">ចំណូលពីការលក់សរុប</div></div>
      </div>

      ${overdue.length ? `
      <div class="section-title">ត្រូវការចុះអង្កេត (${overdue.length})</div>
      ${overdue.slice(0,4).map(f=>{
        const lv=famLastVisit(f);
        return `<div class="alert-item" onclick="Nav.go('familyDetail',{id:'${f.id}'})">
          <div class="dot"></div>
          <div class="txt"><b>${f.name}</b><span>${f.village}, ${f.commune} — កាលបរិច្ឆេទបន្ទាប់ ${fmtDate(lv.nextVisit)} (ហួសកំណត់)</span></div>
        </div>`;
      }).join('')}
      ` : ''}

      <div class="section-title">ចំនួនគ្រួសារតាមឃុំ</div>
      ${Object.entries(communeCounts).filter(([c,n])=>n>0).map(([c,n])=>`
        <div class="bar-row">
          <div class="bar-top"><span>${c}</span><span>${n}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(n/maxCommune)*100}%"></div></div>
        </div>
      `).join('') || '<div style="color:var(--ink-soft); font-size:.85rem;">មិនទាន់មានទិន្នន័យទេ</div>'}
    `;
  }
};

function ringSvg(pct){
  const r=34, c=2*Math.PI*r;
  const off = c - (pct/100)*c;
  const color = pct>=70?'#2F5233':pct>=40?'#E8A33D':'#C4453D';
  return `<svg width="84" height="84" viewBox="0 0 84 84">
    <circle cx="42" cy="42" r="${r}" stroke="#EFE7D3" stroke-width="9" fill="none"/>
    <circle cx="42" cy="42" r="${r}" stroke="${color}" stroke-width="9" fill="none" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 42 42)"/>
    <text x="42" y="48" text-anchor="middle" font-size="20">🐣</text>
  </svg>`;
}

    this.refreshVillageOptions(initCommune, f?f.village:'');
  },
  refreshVillageOptions(commune, selectedVillage){
    const sel = document.getElementById('ff_village');
    if(!sel) return;
    const list = VILLAGES_BY_COMMUNE[commune] || [];
    sel.innerHTML = list.map(v=>`<option ${v===selectedVillage?'selected':''}>${v}</option>`).join('');
  },
  saveFamily(editId){
    const name = document.getElementById('ff_name').value.trim();
    if(!name){ Toast.show('សូមបញ្ចូលឈ្មោះគ្រួសារ'); return; }
    const vuln = Array.from(document.querySelectorAll('#ff_vuln .chip-opt.sel')).map(e=>e.textContent);
    const data = {
      name, gender: document.getElementById('ff_gender').value,
      phone: document.getElementById('ff_phone').value.trim(),
      headOccupation: document.getElementById('ff_occupation').value,
      spouseName: document.getElementById('ff_spouse').value.trim(),
      spouseOccupation: document.getElementById('ff_spouseOcc').value,
      commune: document.getElementById('ff_commune').value,
      village: document.getElementById('ff_village').value,
      childrenCount: Number(document.getElementById('ff_children').value||0),
      enrollDate: document.getElementById('ff_enroll').value,
      cvcName: document.getElementById('ff_cvc').value.trim(),
      vulnTypes: vuln
    };
    if(editId){
      const f = DB.families.find(x=>x.id===editId);
      Object.assign(f, data);
      saveDB(); this.close(); Toast.show('បានកែប្រែព័ត៌មានគ្រួសារ');
      Detail.render(editId);
    } else {
      const nf = Object.assign({id:uid(), batches:[], members:[]}, data);
      DB.families.push(nf);
      saveDB(); this.close(); Toast.show('បានបញ្ចូលគ្រួសារថ្មីរួចរាល់');

      <div class="sheet-handle"></div>
      <h2>${editing?'កែប្រែសមាជិកគ្រួសារ':'បញ្ចូលសមាជិកគ្រួសារថ្មី'}</h2>
      <div class="sub">បំពេញព័ត៌មានលម្អិតរបស់សមាជិកគ្រួសារ</div>
      <div class="field"><label>ឈ្មោះ</label><input id="mf_name" value="${m?m.name:''}" placeholder="ឧ. សុខ សុភា"></div>

        <div class="field"><label>ភេទ</label><select id="mf_gender"><option ${m&&m.gender==='ប្រុស'?'selected':''}>ប្រុស</option><option ${m&&m.gender==='ស្រី'?'selected':''}>ស្រី</option></select></div>
        <div class="field"><label>ទំនាក់ទំនង</label><select id="mf_rel">${RELATIONSHIPS.map(r=>`<option ${m&&m.relationship===r?'selected':''}>${r}</option>`).join('')}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>ថ្ងៃខែឆ្នាំកំណើត</label><input id="mf_dob" type="date" value="${m?m.dob||'':''}"></div>
        <div class="field"><label>អាយុ (ឆ្នាំ)</label><input id="mf_age" type="number" min="0" value="${m?m.age||'':''}"></div>
      </div>
      <div class="field"><label>ពិការភាព</label><select id="mf_disabled"><option value="ទេ" ${!m||m.disabled==='ទេ'?'selected':''}>ទេ</option><option value="បាទ/ចា" ${m&&m.disabled==='បាទ/ចា'?'selected':''}>បាទ/ចា</option></select></div>
      <button class="btn-primary" onclick="Sheets.saveMember('${famId}'${editing?','+memberIdx:''})">${editing?'រក្សាទុកការកែប្រែ':'បញ្ចូលសមាជិក'}</button>
      ${editing?`<button class="btn-danger" onclick="Sheets.deleteMember('${famId}',${memberIdx})">លុបសមាជិកនេះ</button>`:''}
      <button class="btn-secondary" onclick="Sheets.close()">បោះបង់</button>
    `;
    this.open(html);
  },
  saveMember(famId, memberIdx){
    const f = DB.families.find(x=>x.id===famId);
    const name = document.getElementById('mf_name').value.trim();
    if(!name){ Toast.show('សូមបញ្ចូលឈ្មោះសមាជិក'); return; }
    const data = {
      name,
      gender: document.getElementById('mf_gender').value,
      relationship: document.getElementById('mf_rel').value,
      dob: document.getElementById('mf_dob').value,
      age: document.getElementById('mf_age').value,
      disabled: document.getElementById('mf_disabled').value
    };
    f.members = f.members||[];
    if(memberIdx!==undefined && memberIdx!==null && f.members[memberIdx]){
      f.members[memberIdx] = data;
    } else {
      f.members.push(data);
    }
    saveDB(); this.close(); Toast.show('បានរក្សាទុកសមាជិកគ្រួសារ');
    Detail.render(famId);
  },
  deleteMember(famId, memberIdx){
    if(!confirm('តើអ្នកពិតជាចង់លុបសមាជិកនេះមែនទេ?')) return;
    const f = DB.families.find(x=>x.id===famId);
    f.members.splice(memberIdx,1);
    saveDB(); this.close(); Toast.show('បានលុបសមាជិកគ្រួសារ');
    Detail.render(famId);
  },

  batchForm(famId){
    const html = `
      <div class="sheet-handle"></div>
      <h2>បញ្ចូលហ្វូងមាន់ថ្មី</h2>
      <div class="sub">កត់ត្រាការចែកចាយមាន់ដំបូង</div>
      <div class="field"><label>ថ្ងៃខែឆ្នាំទទួលមាន់</label><input id="bf_date" type="date" value="${todayStr()}"></div>
      <div class="field"><label>ប្រភេទពូជមាន់</label><select id="bf_breed">${BREEDS.map(b=>`<option>${b}</option>`).join('')}</select></div>
      <div class="field"><label>គោលបំណងចិញ្ចឹម</label><select id="bf_purpose">${PURPOSES.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <div class="field"><label>ចំនួនកូនមាន់ដំបូង</label><input id="bf_count" type="number" min="1" value="10"></div>
      <button class="btn-primary" onclick="Sheets.saveBatch('${famId}')">បញ្ចូលហ្វូងមាន់</button>

      breed: document.getElementById('bf_breed').value,

  },

  logForm(famId, batchId, type){
    const cfgs = {
      mortality:{title:'កត់ត្រាមរណភាព', fields:`
        <div class="field"><label>ថ្ងៃខែ</label><input id="lg_date" type="date" value="${todayStr()}"></div>
        <div class="field"><label>ចំនួនស្លាប់</label><input id="lg_count" type="number" min="1" value="1"></div>
        <div class="field"><label>មូលហេតុ</label><input id="lg_extra" placeholder="ឧ. ជំងឺរាតត្បាត, សត្វសាហាវ, អាកាសធាតុ"></div>`},
      feed:{title:'កត់ត្រាចំណីអាហារ', fields:`
        <div class="field"><label>ថ្ងៃខែ</label><input id="lg_date" type="date" value="${todayStr()}"></div>
        <div class="field"><label>ប្រភេទចំណី</label><input id="lg_count2" placeholder="ឧ. ស្រូវកិន, កន្ទក់, ត្រី"></div>
        <div class="field"><label>ចំនួន</label><input id="lg_extra" placeholder="ឧ. 2 គីឡូ"></div>`},
      health:{title:'កត់ត្រាសុខភាព/វ៉ាក់សាំង', fields:`
        <div class="field"><label>ថ្ងៃខែ</label><input id="lg_date" type="date" value="${todayStr()}"></div>
        <div class="field"><label>ប្រភេទ</label><input id="lg_count2" placeholder="ឧ. ចាក់វ៉ាក់សាំង Newcastle"></div>
        <div class="field"><label>កំណត់សម្គាល់</label><input id="lg_extra" placeholder="ព័ត៌មានបន្ថែម"></div>`},
      egg:{title:'កត់ត្រាការទទួលបានស៊ុត', fields:`
        <div class="field"><label>ថ្ងៃខែ</label><input id="lg_date" type="date" value="${todayStr()}"></div>
        <div class="field"><label>ចំនួនស៊ុត</label><input id="lg_count" type="number" min="0" value="1"></div>`},
      sales:{title:'កត់ត្រាការលក់', fields:`
        <div class="field"><label>ថ្ងៃខែ</label><input id="lg_date" type="date" value="${todayStr()}"></div>
        <div class="field"><label>ចំនួនលក់ (កូន)</label><input id="lg_count" type="number" min="1" value="1"></div>
        <div class="field"><label>ចំណូល (រៀល)</label><input id="lg_extra" type="number" min="0" placeholder="ឧ. 25000"></div>`}
    };
    const cfg = cfgs[type];
    const html = `
      <div class="sheet-handle"></div>
      <h2>${cfg.title}</h2>
      <div class="sub">ហ្វូងមាន់នេះនឹងត្រូវបានធ្វើបច្ចុប្បន្នភាព</div>
      ${cfg.fields}
      <button class="btn-primary" onclick="Sheets.saveLog('${famId}','${batchId}','${type}')">រក្សាទុក</button>
      <button class="btn-secondary" onclick="Sheets.close()">បោះបង់</button>
    `;
    this.open(html);
  },
  saveLog(famId, batchId, type){
    const f = DB.families.find(x=>x.id===famId);
    const b = f.batches.find(x=>x.id===batchId);
    const date = document.getElementById('lg_date').value;
    if(type==='mortality'){ b.mortalityLog.push({date, count:Number(document.getElementById('lg_count').value||1), cause:document.getElementById('lg_extra').value}); }
    else if(type==='feed'){ b.feedLog.push({date, type:document.getElementById('lg_count2').value, qty:document.getElementById('lg_extra').value}); }
    else if(type==='health'){ b.healthLog.push({date, type:document.getElementById('lg_count2').value, note:document.getElementById('lg_extra').value}); }
    else if(type==='egg'){ b.eggLog.push({date, count:Number(document.getElementById('lg_count').value||0)}); }
    else if(type==='sales'){ b.salesLog.push({date, count:Number(document.getElementById('lg_count').value||1), amount:Number(document.getElementById('lg_extra').value||0)}); }
    saveDB(); this.close(); Toast.show('បានកត់ត្រារួចរាល់');
    Detail.render(famId);
  },

  visitForm(famId){
    const f = DB.families.find(x=>x.id===famId);
    const batches = f.batches||[];
    if(!batches.length){ Toast.show('សូមបញ្ចូលហ្វូងមាន់មុនសិន'); return; }
    const html = `
      <div class="sheet-handle"></div>
      <h2>កត់ត្រាការចុះអង្កេត</h2>
      <div class="sub">កត់ត្រាការសង្កេតរបស់ CVC ក្នុងអំឡុងការចុះទស្សនកិច្ច</div>
      <div class="field"><label>ហ្វូងមាន់</label><select id="vf_batch">${batches.map(b=>`<option value="${b.id}">${b.breed} — ទទួល ${fmtDate(b.receivedDate)}</option>`).join('')}</select></div>
      <div class="field"><label>ថ្ងៃខែចុះអង្កេត</label><input id="vf_date" type="date" value="${todayStr()}"></div>
      <div class="field"><label>សេចក្តីសង្កេត</label><textarea id="vf_note" placeholder="ស្ថានភាពមាន់, បញ្ហាដែលឃើញ, ការណែនាំ..."></textarea></div>
      <div class="field"><label>រូបថត (ស្រេចចិត្ត)</label>
        <div class="photo-drop"><input type="file" accept="image/*" id="vf_photo" onchange="Sheets.previewPhoto(event)">📷 ចុចដើម្បីបញ្ចូលរូបថត</div>
        <img id="vf_photoPreview" class="photo-preview" style="display:none;">
      </div>
      <div class="field"><label>ថ្ងៃចុះអង្កេតលើកក្រោយ</label><input id="vf_next" type="date"></div>
      <button class="btn-primary" onclick="Sheets.saveVisit('${famId}')">រក្សាទុកការចុះអង្កេត</button>
      <button class="btn-secondary" onclick="Sheets.close()">បោះបង់</button>
    `;
    this.open(html);
  },
  previewPhoto(e){
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      const img = document.getElementById('vf_photoPreview');
      img.src = ev.target.result; img.style.display='block';
      img.dataset.b64 = ev.target.result;
    };
    reader.readAsDataURL(file);
  },
  saveVisit(famId){
    const f = DB.families.find(x=>x.id===famId);
    const b = f.batches.find(x=>x.id===document.getElementById('vf_batch').value);
    const photoEl = document.getElementById('vf_photoPreview');
    b.visitLog = b.visitLog||[];
    b.visitLog.push({
      date: document.getElementById('vf_date').value,
      note: document.getElementById('vf_note').value.trim(),
      photo: photoEl.dataset.b64 || '',
      nextVisit: document.getElementById('vf_next').value
    });
    saveDB(); this.close(); Toast.show('បានកត់ត្រាការចុះអង្កេត');
    Detail.render(famId);
  }
};

/* =========================================================

========================================================= */
const Reports = {
  render(){
    const fams = allFamilies();
    const totalIncome = fams.reduce((s,f)=>s+famTotalIncome(f),0);
    const vulnCounts = {};
    fams.forEach(f=>(f.vulnTypes||[]).forEach(v=>vulnCounts[v]=(vulnCounts[v]||0)+1));
    const maxV = Math.max(1,...Object.values(vulnCounts));

    document.getElementById('reportsContent').innerHTML = `
      <div class="kpi-grid">
        <div class="kpi-card full">
          <div><div class="num">${totalIncome.toLocaleString()}៛</div><div class="lbl">ចំណូលសរុបពីការចិញ្ចឹមមាន់ (គ្រប់គ្រួសារ)</div></div>
          <div style="font-size:2rem;">💰</div>
        </div>
      </div>
      <div class="section-title">តាមប្រភេទភាពងាយរងគ្រោះ</div>
      ${Object.entries(vulnCounts).map(([v,n])=>`
        <div class="bar-row"><div class="bar-top"><span>${v}</span><span>${n}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${(n/maxV)*100}%; background:linear-gradient(90deg,var(--rust),var(--gold))"></div></div></div>
      `).join('') || '<div style="color:var(--ink-soft); font-size:.85rem;">មិនទាន់មានទិន្នន័យទេ</div>'}

      <div class="section-title">នាំចេញទិន្នន័យ</div>
      <button class="btn-primary" onclick="Reports.exportCsv()">⬇️ នាំចេញជា CSV (គ្រួសារទាំងអស់)</button>
    `;
  },
  exportCsv(){
    const rows = [['ឈ្មោះ','ភេទ','មុខរបរប្រធានគ្រួសារ','ឈ្មោះប្រពន្ធ/ប្តី','មុខរបរប្រពន្ធ/ប្តី','ឃុំ','ភូមិ','លេខទូរស័ព្ទ','ចំនួនកូន','CVC','ថ្ងៃចូលរួម','ប្រភេទភាពងាយរងគ្រោះ','ចំនួនមាន់ដំបូងសរុប','ចំនួនមាន់បច្ចុប្បន្ន','ចំនួនស្លាប់សរុប','ចំណូលសរុប(៛)']];
    allFamilies().forEach(f=>{
      const deaths = famAllBatches(f).reduce((s,b)=>s+batchDeaths(b),0);
      rows.push([f.name,f.gender,f.headOccupation||'',f.spouseName||'',f.spouseOccupation||'',f.commune,f.village,f.phone||'',f.childrenCount||0,f.cvcName||'',f.enrollDate||'',(f.vulnTypes||[]).join('; '),famTotalInitial(f),famTotalCurrent(f),deaths,famTotalIncome(f)]);
    });
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='ទិន្នន័យគ្រួសារ_ចិញ្ចឹមមាន់_'+todayStr()+'.csv'; a.click();
    Toast.show('កំពុងទាញយកឯកសារ CSV...');
  }
};

const Settings = {
  render(){
    document.getElementById('settingsContent').innerHTML = `
      <div class="settings-row"><div><div class="t">${Auth.userName||'—'}</div><div class="s">${Auth.role==='admin'?'អ្នកគ្រប់គ្រង':'អ្នកសម្របសម្រួលសហគមន៍ (CVC)'}</div></div><span style="font-size:1.5rem;">${Auth.role==='admin'?'🔐':'👩‍🌾'}</span></div>

      <div class="section-title">កម្មវិធី</div>
      <div class="settings-row" id="installAppBtn" style="display:none; cursor:pointer;" onclick="triggerInstallPrompt()"><div><div class="t">ដំឡើងកម្មវិធីលើទូរស័ព្ទ</div><div class="s">បន្ថែមទៅអេក្រង់ដើម ដើម្បីប្រើប្រាស់ដូចកម្មវិធីធម្មតា</div></div><span>📲</span></div>

      <div class="section-title">ទិន្នន័យ</div>
      <div class="settings-row" onclick="Reports.exportCsv()"><div><div class="t">នាំចេញទិន្នន័យទាំងអស់</div><div class="s">ទាញយកជាឯកសារ CSV</div></div><span>⬇️</span></div>
      ${Auth.role==='admin' ? `
      <div class="settings-row" onclick="Settings.changePin()"><div><div class="t">ប្តូរកូដ PIN អ្នកគ្រប់គ្រង</div><div class="s">កូដបច្ចុប្បន្នមាន ៤ខ្ទង់</div></div><span>🔑</span></div>
      <div class="settings-row" onclick="Settings.resetData()"><div><div class="t" style="color:var(--danger)">លុបទិន្នន័យទាំងអស់</div><div class="s">សកម្មភាពនេះមិនអាចត្រឡប់វិញបានទេ</div></div><span>🗑️</span></div>
      ` : ''}

      <div class="section-title">អំពីកម្មវិធី</div>
      <div class="batch-card">
        <p style="font-size:.85rem; line-height:1.7; color:var(--ink-soft);">
        កម្មវិធីនេះជួយអ្នកសម្របសម្រួលសហគមន៍ (CVC) និងបុគ្គលិកកម្មវិធីតាមដានវឌ្ឍនភាពគម្រោងចិញ្ចឹមមាន់ ដែលផ្តល់ដល់គ្រួសារងាយរងគ្រោះបំផុត។ ទិន្នន័យរក្សាទុកនៅលើឧបករណ៍របស់អ្នក។
        </p>
      </div>
      <button class="btn-secondary" onclick="Auth.logout()">ចាកចេញ</button>
    `;
  },
  changePin(){
    const np = prompt('វាយបញ្ចូលកូដ PIN ថ្មី (៤ខ្ទង់)៖');
    if(!np) return;
    if(!/^\d{4}$/.test(np)){ Toast.show('កូដ PIN ត្រូវតែជាលេខ ៤ខ្ទង់'); return; }
    DB.settings.pin = np; saveDB(); Toast.show('បានប្តូរកូដ PIN ជោគជ័យ');
  },
  resetData(){
    const np = prompt('សូមវាយកូដ PIN ដើម្បីបញ្ជាក់ការលុបទិន្នន័យទាំងអស់៖');
    if(np!==DB.settings.pin){ Toast.show('កូដ PIN មិនត្រឹមត្រូវ'); return; }
    if(!confirm('លុបទិន្នន័យទាំងអស់? សកម្មភាពនេះមិនអាចត្រឡប់វិញបានទេ។')) return;
    DB.families = [];
    saveDB(); Toast.show('បានលុបទិន្នន័យទាំងអស់');
    Nav.go('dashboard');
  }
};

/* =========================================================
   PWA: SERVICE WORKER + INSTALL PROMPT
========================================================= */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
  });
}
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installAppBtn');
  if (btn) btn.style.display = 'flex';
});
function triggerInstallPrompt(){
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => {
    deferredInstallPrompt = null;
    const btn = document.getElementById('installAppBtn');
    if (btn) btn.style.display = 'none';
  });
}
